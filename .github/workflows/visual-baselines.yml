name: Visual baselines (keyframes)

# Generates + commits the Linux Playwright KEYFRAME visual-regression baselines
# (S5 Wave 2·J follow-up). Playwright snapshots are OS/font-specific, so they must
# be produced in CI — not on a developer Mac. This deliberately MIRRORS the shared
# reusable CI (GENIEMARKETING/.github → ci.yml): ubuntu-latest · pnpm ·
# setup-node@v6 with npm.pkg.github.com · NODE_AUTH_TOKEN=GITHUB_TOKEN for
# @geniemarketing reads · `playwright install --with-deps chromium`. Same env ⇒
# the committed baselines match what that pipeline renders.
#
# Modes:
#   • baselines MISSING on a push, or workflow_dispatch(update_snapshots=true)
#       → regenerate + COMMIT the baselines back to the branch (auto-bootstrap)
#   • otherwise (push with baselines present / pull_request)
#       → COMPARE against the committed baselines (the ongoing guard)
#
# It is a SEPARATE file (not ci.yml) on purpose: ci.yml only delegates to the
# shared reusable workflow ("do not fork"), and a reusable-workflow `uses:` job
# cannot host the extra build/commit steps this needs. A `push` trigger (not just
# workflow_dispatch) is used because dispatch only registers from the default
# branch (master), while this repo's working/deploy branch is next-rebuild.

on:
  push:
    branches: [next-rebuild]
  pull_request:
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Regenerate and commit the keyframe baselines'
        type: boolean
        default: false

permissions:
  contents: write # commit the regenerated baselines back to the branch
  packages: read # @geniemarketing/* from GitHub Packages via GITHUB_TOKEN

concurrency:
  group: visual-baselines-${{ github.ref }}
  cancel-in-progress: true

jobs:
  keyframes:
    name: keyframe visual-regression
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      # Media renders from the live CloudFront edge (matches production). Without
      # this, mediaUrl() would emit the removed local /public paths → broken images.
      NEXT_PUBLIC_MEDIA_BASE: https://img.fatdogspirits.com/touch-vodka
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # @geniemarketing/* are private org packages the workflow's GITHUB_TOKEN
          # can't read (cross-repo 403). PACKAGES_READ_TOKEN is the classic read:packages
          # PAT (same one Amplify uses) stored as a repo Actions secret.
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Decide mode (update + commit, or compare)
        id: mode
        run: |
          event="${{ github.event_name }}"
          dispatch_update="${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}"
          missing="false"; [ -z "$(ls -A e2e/__screenshots__ 2>/dev/null)" ] && missing="true"
          if [ "$dispatch_update" = "true" ] || { [ "$event" = "push" ] && [ "$missing" = "true" ]; }; then
            echo "update=1" >> "$GITHUB_OUTPUT"
            echo "Mode: UPDATE + COMMIT baselines (event=$event, missing=$missing)"
          else
            echo "update=0" >> "$GITHUB_OUTPUT"
            echo "Mode: COMPARE against committed baselines (event=$event, missing=$missing)"
          fi

      - name: Generate + commit baselines
        if: ${{ steps.mode.outputs.update == '1' }}
        run: |
          pnpm exec playwright test keyframes.spec.ts --update-snapshots
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/__screenshots__
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "ci: commit Linux Playwright keyframe visual baselines (S5)"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Compare against committed baselines
        if: ${{ steps.mode.outputs.update == '0' }}
        run: pnpm exec playwright test keyframes.spec.ts

      - name: Upload report + diffs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-keyframes
          path: |
            playwright-report/
            test-results/
          retention-days: 14
